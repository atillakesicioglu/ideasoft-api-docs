name: Release Bundled Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build bundled artifacts
        run: |
          pip install pyyaml requests
          python scripts/build_pipeline.py --skip-lint

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/bundled/admin-api.json
            artifacts/bundled/admin-api.meta.json
            artifacts/bundled/store-api.json
            artifacts/bundled/store-api.meta.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
