name: Validate OpenAPI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm ci

      - name: Build pipeline
        run: python scripts/build_pipeline.py --skip-lint

      - name: Redocly lint domain specs
        run: npm run lint:domains

      - name: Quality gates
        run: python scripts/validate_quality.py

      - name: Ensure generated files are committed
        run: git diff --exit-code
