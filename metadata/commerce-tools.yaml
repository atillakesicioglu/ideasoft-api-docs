schema_version: '2.1'
description: Küratörlü, platformdan bağımsız MCP commerce tool tanımları.
tools:
- name: search_products
  description: Ürünleri listele veya filtrele.
  platform_agnostic: true
  authentication: &id001
    type: oauth2
    flow: client_credentials
    token_url: https://magaza-adiniz.myideasoft.com/oauth/v2/token
    expose_to_model: false
  runtime_configuration: &id002
    base_url:
      description: Mağaza base URL (ör. https://magaza-adiniz.myideasoft.com)
      default: https://magaza-adiniz.myideasoft.com
      expose_to_model: false
    access_token:
      description: OAuth 2.0 Bearer token — MCP runtime tarafından enjekte edilir
      expose_to_model: false
      security_note: Token tool input, tool output veya loglarda bulunmamalıdır.
  mappings:
  - api: admin-api
    method: GET
    path: /admin-api/products
    operation_id: 6hvi6as48mv56
    summary: Product LIST
  - api: store-api
    method: GET
    path: /api/products
    operation_id: qsr9fu2u1lrlh
    summary: Product LIST
- name: get_product
  description: Tek ürün detayını getir.
  platform_agnostic: true
  authentication: *id001
  runtime_configuration: *id002
  mappings:
  - api: admin-api
    method: GET
    path: /admin-api/products/{id}
    operation_id: cgov84whtjhzn
    summary: Product GET
  - api: store-api
    method: GET
    path: /api/products/{id}
    operation_id: p0r4e04klu229
    summary: Product GET
- name: create_product
  description: Yeni ürün oluştur.
  platform_agnostic: true
  authentication: *id001
  runtime_configuration: *id002
  mappings:
  - api: admin-api
    method: POST
    path: /admin-api/products
    operation_id: 8pzfiy7v4vow9
    summary: Product POST
- name: update_product
  description: Mevcut ürünü güncelle.
  platform_agnostic: true
  authentication: *id001
  runtime_configuration: *id002
  mappings:
  - api: admin-api
    method: PUT
    path: /admin-api/products/{id}
    operation_id: p7r7yfxlfjma9
    summary: Product PUT
  - api: store-api
    method: PUT
    path: /api/products/{id}
    operation_id: vyvlvovhvs74f
    summary: Product PUT
